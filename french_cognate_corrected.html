            background: #e8f5e9;
        }

        .question-card.incorrect {

        }

            padding: 15px;
            margin: 15px 0;
            border-radius: 0 8px 8px 0;

            color: #e65100;

            gap: 10px;

        }

            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s ease;

            transform: translateY(-2px);
        }

        .check-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .accent-keyboard {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .accent-keyboard h3 {
            margin-bottom: 10px;
            color: #333;
        }

            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 10px 15px;
            margin: 5px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s ease;

        .accent-btn:hover {
            background: #6a11cb;
            color: white;
            border-color: #6a11cb;
        }

            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

            opacity: 1;
        }

        .result.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;

            border: none;
            border-radius: 8px;

<body>
    <div class="container">
        <div class="header">
            <h1>French Cognate Pattern Practice</h1>
            <p>Master French-English word patterns through systematic practice</p>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">0 / 0</div>
            </div>
        </div>

        <div class="pattern-selector" id="patternSelector">
            <h2>Choose Learning Mode</h2>
            <div style="margin: 20px 0;">
                <button class="pattern-btn" onclick="practiceAll()" style="margin-right: 15px;">Practice All Patterns</button>
                <button class="pattern-btn" onclick="showPatternGrid()">Practice by Pattern</button>
            </div>
            <div class="pattern-grid" id="patternGrid" style="display: none;"></div>
        </div>

        <div class="pattern-info" id="patternInfo" style="display: none;">
            <h3 id="currentPatternTitle"></h3>
            <p id="currentPatternDesc"></p>
        </div>

        <div class="practice-area" id="practiceArea" style="display: none;">
            <div class="question-card" id="questionCard">
                <div class="english-word" id="englishWord"></div>
                <div class="word-info" id="wordInfo"></div>
                <div class="meaning-hint" id="meaningHint" style="display: none;"></div>
                
                <div class="accent-keyboard">
                    <h3>Accent Helper</h3>
                    <button class="accent-btn" onclick="addAccent('à')">à</button>
                    <button class="accent-btn" onclick="addAccent('â')">â</button>
                    <button class="accent-btn" onclick="addAccent('é')">é</button>
                    <button class="accent-btn" onclick="addAccent('è')">è</button>
                    <button class="accent-btn" onclick="addAccent('ê')">ê</button>
                    <button class="accent-btn" onclick="addAccent('ë')">ë</button>
                    <button class="accent-btn" onclick="addAccent('î')">î</button>
                    <button class="accent-btn" onclick="addAccent('ï')">ï</button>
                    <button class="accent-btn" onclick="addAccent('ô')">ô</button>
                    <button class="accent-btn" onclick="addAccent('ù')">ù</button>
                    <button class="accent-btn" onclick="addAccent('û')">û</button>
                    <button class="accent-btn" onclick="addAccent('ü')">ü</button>
                    <button class="accent-btn" onclick="addAccent('ç')">ç</button>
                </div>

                <div class="input-container">
                    <input type="text" id="frenchInput" class="french-input" placeholder="Type the French cognate..." autocomplete="off">
                    <button class="check-btn" id="checkBtn" onclick="checkAnswer()">Check</button>
                </div>

                <div class="result" id="result"></div>
                <div class="variation-info" id="variationInfo" style="display: none;">
                    Note: We accept conjugated verbs and gender variations where appropriate.
                </div>
            </div>

            <div class="controls">
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next Question</button>
                <button class="pattern-btn" onclick="showPatternSelector()">Change Pattern</button>
                <button class="export-btn" onclick="exportToPDF()">Export Results</button>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <h2>🎉 Félicitations!</h2>
            <div class="final-score" id="finalScore"></div>
            <button class="next-btn" onclick="restartPractice()">Practice Again</button>
            <button class="export-btn" onclick="exportToPDF()">Export Final Results</button>
            <button class="pattern-btn" onclick="showPatternSelector()">Choose New Pattern</button>
        </div>
    </div>

                    {english: "natural", french: "naturel", meanings: "natural"},
                    {english: "general", french: "général", meanings: "general"},
                    {english: "moral", french: "moral", meanings: "moral"},
                    {english: "national", french: "national", meanings: "national"},
                    {english: "original", french: "original", meanings: "original"},
                    {english: "special", french: "spécial", meanings: "special"},
                    {english: "central", french: "central", meanings: "central"},
                    {english: "personal", french: "personnel", meanings: "personal"},
                    {english: "international", french: "international", meanings: "international"},
                    {english: "emotional", french: "émotionnel", meanings: "emotional"}
                ]
            },
            15: {
                title: "English to French: Perfect cognates",
                description: "English words that are identical or nearly identical in French",
                words: [
                    {english: "animal", french: "animal", meanings: "animal"},
                    {english: "capital", french: "capital", meanings: "capital"},
                    {english: "chocolate", french: "chocolat", meanings: "chocolate"},
                    {english: "client", french: "client", meanings: "client"},
                    {english: "concert", french: "concert", meanings: "concert"},
                    {english: "desert", french: "désert", meanings: "desert"},
                    {english: "fruit", french: "fruit", meanings: "fruit"},
                    {english: "garage", french: "garage", meanings: "garage"},
                    {english: "hotel", french: "hôtel", meanings: "hotel"},
                    {english: "metal", french: "métal", meanings: "metal"}
                ]
            }
        };

        let currentPatternKey = null;
        let currentWords = [];
        let currentIndex = 0;
        let correctAnswers = 0;
        let results = [];
        let answered = false;

        // Words that need meaning hints due to complexity or false friends
        const meaningHints = {
            "confortable": "Note: French spelling has no 'm' before the 't'",
            "raisonnable": "Note: French spelling has double 'n'",
            "précieux": "This means 'valuable/precious' - not a direct cognate of 'valuable'",
            "chocolat": "Note: No final 'e' in French",
            "désert": "Note: accent on first 'e'",
            "hôtel": "Note: circumflex accent on 'ô'",
            "métal": "Note: accent on first 'e'"
        };

        // Improved normalization function that preserves word structure
        function normalize(text) {
            return text.toLowerCase().trim()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // Remove accents but preserve other characters
        }

        // Check if the user's answer is correct with flexible matching
        function isAnswerCorrect(userAnswer, correctAnswer, englishWord) {
            // Normalize both answers
            const normalizedUser = normalize(userAnswer);
            const normalizedCorrect = normalize(correctAnswer);
            
            // Direct match
            if (normalizedUser === normalizedCorrect) {
                return true;
            }
            
            // Check for verb conjugations
            if (isVerbConjugation(userAnswer, correctAnswer, englishWord)) {
                return true;
            }
            
            // Check for gender variations
            if (isGenderVariation(userAnswer, correctAnswer)) {
                return true;
            }
            
            // Check for number variations (singular/plural)
            if (isNumberVariation(userAnswer, correctAnswer)) {
                return true;
            }
            
            return false;
        }

        // Check if the user's answer is a valid verb conjugation
        function isVerbConjugation(userAnswer, correctAnswer, englishWord) {
            // Only check for verbs
            if (!englishWord || typeof englishWord !== 'string') return false;
            
            const normalizedUser = normalize(userAnswer);
            const normalizedCorrect = normalize(correctAnswer);
            
            // Check if the correct answer is a verb (ends with -er, -ir, -re)
            if (normalizedCorrect.endsWith('er') || normalizedCorrect.endsWith('ir') || normalizedCorrect.endsWith('re')) {
                // Common conjugated forms
                const conjugatedForms = getConjugatedForms(normalizedCorrect);
                
                // Check if user's answer matches any conjugated form
                return conjugatedForms.includes(normalizedUser);
            }
            
            return false;
        }

        // Generate common conjugated forms for a French verb
        function getConjugatedForms(verb) {
            const base = verb.slice(0, -2); // Remove the -er/-ir/-re ending
            const ending = verb.slice(-2); // Get the ending (-er, -ir, or -re)
            
            let forms = [];
            
            if (ending === 'er') {
                forms = [
                    base + 'e',      // je form
                    base + 'es',     // tu form
                    base + 'e',      // il/elle/on form
                    base + 'ons',    // nous form
                    base + 'ez',     // vous form
                    base + 'ent'     // ils/elles form
                ];
            } else if (ending === 'ir') {
                forms = [
                    base + 'is',     // je form
                    base + 'is',     // tu form
                    base + 'it',     // il/elle/on form
                    base + 'issons', // nous form
                    base + 'issez',  // vous form
                    base + 'issent'  // ils/elles form
                ];
            } else if (ending === 're') {
                forms = [
                    base + 's',      // je form
                    base + 's',     // tu form
                    base + '',       // il/elle/on form
                    base + 'ons',    // nous form
                    base + 'ez',     // vous form
                    base + 'ent'     // ils/elles form
                ];
            }
            
            return forms;
        }

        // Check if the user's answer is a gender variation
        function isGenderVariation(userAnswer, correctAnswer) {
            const normalizedUser = normalize(userAnswer);
            const normalizedCorrect = normalize(correctAnswer);
            
            // Check for masculine/feminine variation (e/ée)
            if (normalizedCorrect.endsWith('e') && normalizedUser === normalizedCorrect + 'e') {
                return true;
            }
            
            if (normalizedCorrect.endsWith('ee') && normalizedUser === normalizedCorrect.slice(0, -1)) {
                return true;
            }
            
            // Check for eux/euse variation
            if (normalizedCorrect.endsWith('eux') && normalizedUser === normalizedCorrect.slice(0, -3) + 'euse') {
                return true;
            }
            
            if (normalizedCorrect.endsWith('euse') && normalizedUser === normalizedCorrect.slice(0, -4) + 'eux') {
                return true;
            }
            
            return false;
        }

        // Check if the user's answer is a number variation (singular/plural)
        function isNumberVariation(userAnswer, correctAnswer) {
            const normalizedUser = normalize(userAnswer);
            const normalizedCorrect = normalize(correctAnswer);
            
            // Check for singular/plural variation (add s)
            if (normalizedCorrect.endsWith('s') && normalizedUser === normalizedCorrect.slice(0, -1)) {
                return true;
            }
            
            if (!normalizedCorrect.endsWith('s') && normalizedUser === normalizedCorrect + 's') {
                return true;
            }
            
            // Check for al/aux variation
            if (normalizedCorrect.endsWith('al') && normalizedUser === normalizedCorrect.slice(0, -2) + 'aux') {
                return true;
            }
            
            if (normalizedCorrect.endsWith('aux') && normalizedUser === normalizedCorrect.slice(0, -3) + 'al') {
                return true;
            }
            
            return false;
        }

        function showPatternSelector() {
            document.getElementById('patternSelector').classList.add('show');
            document.getElementById('practiceArea').style.display = 'none';
            document.getElementById('completionScreen').classList.remove('show');
            document.getElementById('patternInfo').style.display = 'none';
            updateProgress(0, 0);
        }

        function showPatternGrid() {
            const grid = document.getElementById('patternGrid');
            grid.style.display = 'grid';
            grid.innerHTML = '';
            
            Object.entries(cognatePatterns).forEach(([key, pattern]) => {
                const card = document.createElement('div');
                card.className = 'pattern-card';
                card.onclick = () => selectPattern(key);
                card.innerHTML = `
                    <div class="pattern-title">${pattern.title}</div>
                    <div class="pattern-count">${pattern.words.length} words</div>
                `;
                grid.appendChild(card);
            });
        }

        function selectPattern(patternKey) {
            currentPatternKey = patternKey;
            startPractice([cognatePatterns[patternKey]]);
        }

        function practiceAll() {
            currentPatternKey = 'all';
            startPractice(Object.values(cognatePatterns));
        }

        function startPractice(patterns) {
            currentWords = [];
            patterns.forEach(pattern => {
                pattern.words.forEach(word => {
                    currentWords.push({
                        ...word,
                        pattern: pattern.title,
                        patternDesc: pattern.description
                    });
                });
            });
            
            // Shuffle words
            currentWords = currentWords.sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            correctAnswers = 0;
            results = [];
            answered = false;
            
            document.getElementById('patternSelector').classList.remove('show');
            document.getElementById('practiceArea').style.display = 'block';
            document.getElementById('completionScreen').classList.remove('show');
            
            if (currentPatternKey !== 'all') {
                const pattern = cognatePatterns[currentPatternKey];
                document.getElementById('patternInfo').style.display = 'block';
                document.getElementById('currentPatternTitle').textContent = pattern.title;
                document.getElementById('currentPatternDesc').textContent = pattern.description;
            } else {
                document.getElementById('patternInfo').style.display = 'none';
            }
            
            // Show variation info for verbs
            document.getElementById('variationInfo').style.display = 'block';
            
            displayQuestion();
        }

        function displayQuestion() {
            if (currentIndex >= currentWords.length) {
                showCompletion();
                return;
            }

            const current = currentWords[currentIndex];
            document.getElementById('englishWord').textContent = current.english;
            
            let wordInfo = `<div><strong>Meaning:</strong> ${current.meanings}</div>`;
            if (currentPatternKey === 'all') {
                wordInfo += `<div style="margin-top: 8px;"><strong>Pattern:</strong> ${current.pattern}</div>`;
            }
            
            document.getElementById('wordInfo').innerHTML = wordInfo;
            
            // Show meaning hint if needed
            const hintDiv = document.getElementById('meaningHint');
            if (meaningHints[current.french]) {
                hintDiv.style.display = 'block';
                hintDiv.textContent = `💡 Learning tip: ${meaningHints[current.french]}`;
            } else {
                hintDiv.style.display = 'none';
            }
            
            document.getElementById('frenchInput').value = '';
            document.getElementById('frenchInput').focus();
            document.getElementById('result').classList.remove('show');
            document.getElementById('questionCard').classList.remove('correct', 'incorrect');
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('checkBtn').disabled = false;
            answered = false;
            updateProgress(currentIndex, currentWords.length);
        }

        function checkAnswer() {
            if (answered) return;
            
            const userInput = document.getElementById('frenchInput').value.trim();
            const current = currentWords[currentIndex];
            const resultDiv = document.getElementById('result');
            
            const isCorrect = isAnswerCorrect(userInput, current.french, current.english);
            
            if (isCorrect) {
                correctAnswers++;
                resultDiv.textContent = '✓ Correct! Well done recognising the pattern.';
                resultDiv.className = 'result correct show';
                document.getElementById('questionCard').classList.add('correct');
            } else {
                resultDiv.innerHTML = `✗ Incorrect. The answer is: <strong>${current.french}</strong><br>Pattern: ${current.patternDesc}`;
                resultDiv.className = 'result incorrect show';
                document.getElementById('questionCard').classList.add('incorrect');
            }
            
            results.push({
                english: current.english,
                userAnswer: userInput,
                correctAnswer: current.french,
                isCorrect: isCorrect,
                meanings: current.meanings,
                pattern: current.pattern,
                patternDesc: current.patternDesc
            });
            
            answered = true;
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('checkBtn').disabled = true;
        }

        function nextQuestion() {
            currentIndex++;
            displayQuestion();
        }

        function showCompletion() {
            document.getElementById('practiceArea').style.display = 'none';
            document.getElementById('completionScreen').classList.add('show');
            document.getElementById('patternInfo').style.display = 'none';
            const percentage = Math.round((correctAnswers / currentWords.length) * 100);
            document.getElementById('finalScore').textContent = 
                `You got ${correctAnswers} out of ${currentWords.length} correct (${percentage}%)`;
        }

        function restartPractice() {
            if (currentPatternKey === 'all') {
                practiceAll();
            } else {
                selectPattern(currentPatternKey);
            }
        }

        function updateProgress(current, total) {
            const progress = total > 0 ? (current / total) * 100 : 0;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${current} / ${total}`;
        }

        function addAccent(letter) {
            const input = document.getElementById('frenchInput');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const currentValue = input.value;
            
            input.value = currentValue.substring(0, start) + letter + currentValue.substring(end);
            input.selectionStart = input.selectionEnd = start + 1;
            input.focus();
        }

        function exportToPDF() {
            if (results.length === 0) {
                alert('No results to export yet! Complete some questions first.');
                return;
            }
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Title
            doc.setFontSize(18);
            doc.text('French Cognate Pattern Practice Results', 20, 20);
            
            // Summary
            doc.setFontSize(12);
            const percentage = Math.round((correctAnswers / results.length) * 100);
            doc.text(`Score: ${correctAnswers}/${results.length} (${percentage}%)`, 20, 35);
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 45);
            doc.text(`Practice Mode: ${currentPatternKey === 'all' ? 'All Patterns' : cognatePatterns[currentPatternKey]?.title || 'Selected Pattern'}`, 20, 55);
            
            // Group results by pattern for better organisation
            const groupedResults = {};
            results.forEach(result => {
                if (!groupedResults[result.pattern]) {
                    groupedResults[result.pattern] = [];
                }
                groupedResults[result.pattern].push(result);
            });
            
            let y = 75;
            
            Object.entries(groupedResults).forEach(([pattern, patternResults]) => {
                if (y > 260) {
                    doc.addPage();
                    y = 20;
                }
                
                // Pattern header
                doc.setFontSize(11);
                doc.setFont(undefined, 'bold');
                doc.text(`Pattern: ${pattern}`, 20, y);
                y += 8;
                
                // Results for this pattern
                doc.setFontSize(9);
                doc.setFont(undefined, 'normal');
                
                patternResults.forEach(result => {
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                    
                    const status = result.isCorrect ? '✓' : '✗';
                    doc.text(`${status} ${result.english} → ${result.correctAnswer}`, 25, y);
                    
                    if (!result.isCorrect && result.userAnswer) {
                        y += 5;
                        doc.text(`   Your answer: ${result.userAnswer}`, 25, y);
                    }
                    
                    y += 6;
                });
                
                y += 5; // Space between patterns
            });
            
            doc.save('french-cognate-pattern-results.pdf');
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('frenchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    if (!answered) {
                        checkAnswer();
                    } else {
                        nextQuestion();
                    }
                }
            });
            
            showPatternSelector();
        });
    </script>
